<mat-toolbar color="primary" class="main-nav">
  <div class="logo-area" routerLink="/dashboard">
    <mat-icon class="logo-icon">admin_panel_settings</mat-icon>
    <span class="logo-text">Enterprise CMS</span>
  </div>

  <span class="spacer"></span>

  <div class="nav-links">
    <button mat-button routerLink="/dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon> Dashboard
    </button>
    <button mat-button routerLink="/employees" routerLinkActive="active-link">
      <mat-icon>people</mat-icon> Workforce
    </button>
  </div>

  <div class="user-area">
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu" class="glass-menu">
      <div class="menu-header">
        <p class="user-email">{{ userEmail }}</p>
      </div>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
