<div class="container workforce-container">
    <div class="header glass-card">
        <div class="title-section">
            <h1>Workforce Directory</h1>
            <p>Manage and monitor your enterprise team</p>
        </div>
        <div class="actions-header">
            <mat-form-field appearance="outline" class="search-field">
                <mat-label>Search employees...</mat-label>
                <input matInput [(ngModel)]="searchQuery" (keyup)="applyFilters()" placeholder="Name or Role">
                <mat-icon matPrefix>search</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="filter-field">
                <mat-label>Department</mat-label>
                <mat-select [(ngModel)]="selectedDepartment" (selectionChange)="applyFilters()">
                    <mat-option *ngFor="let dept of departments" [value]="dept">
                        {{dept}}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <div class="button-group">
                <button mat-stroked-button color="accent" (click)="exportToCSV()">
                    <mat-icon>download</mat-icon> Export
                </button>
                <button mat-raised-button color="primary" routerLink="/employee/add">
                    <mat-icon>person_add</mat-icon> Add
                </button>
            </div>
        </div>
    </div>

    <div class="table-container glass-card">
        <table mat-table [dataSource]="dataSource" matSort class="full-width">

            <!-- ID Column -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                <td mat-cell *matCellDef="let element"> {{element.id}} </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                <td mat-cell *matCellDef="let element" class="emp-name"> {{element.name}} </td>
            </ng-container>

            <!-- Role Column -->
            <ng-container matColumnDef="role">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Role </th>
                <td mat-cell *matCellDef="let element">
                    <span class="role-badge">{{element.role}}</span>
                </td>
            </ng-container>

            <!-- Department Column -->
            <ng-container matColumnDef="department">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Department </th>
                <td mat-cell *matCellDef="let element"> {{element.department}} </td>
            </ng-container>

            <!-- Salary Column -->
            <ng-container matColumnDef="salary">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Salary </th>
                <td mat-cell *matCellDef="let element"> {{element.salary | currency:'INR'}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" [routerLink]="['/employee/edit', element.id]"
                        matTooltip="Edit Employee">
                        <mat-icon>edit_note</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteEmployee(element)" matTooltip="Delete Employee">
                        <mat-icon>delete_sweep</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" [appHighlightSalary]="row.salary"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons aria-label="Select page of employees"
            class="glass-paginator"></mat-paginator>
    </div>
</div>
